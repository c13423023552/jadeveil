name: theme-lint
on:
  push:
    paths: ["theme.css", "lint-baseline.json", "scripts/theme_lint.py"]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml
      - run: python3 scripts/theme_lint.py
